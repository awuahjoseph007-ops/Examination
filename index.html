<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Modern House - 3D Virtual Tour</title>
  <script src="aframe.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script>
    // Auto-scale component: measures model bounding box on load, scales to target height
    // Also strips backdrop/environment planes that Sketchfab models often include
    AFRAME.registerComponent('auto-scale', {
      schema: { height: { type: 'number', default: 2 } },
      init: function () {
        // Hide until properly scaled
        this.el.object3D.visible = false;

        this.el.addEventListener('model-loaded', () => {
          var mesh = this.el.getObject3D('mesh');
          if (!mesh) return;

          // Collect all mesh sizes to find outlier backdrop planes
          var meshSizes = [];
          mesh.traverse(function (child) {
            if (child.isMesh && child.geometry) {
              var geo = child.geometry;
              if (!geo.boundingBox) geo.computeBoundingBox();
              if (geo.boundingBox) {
                var s = new THREE.Vector3();
                geo.boundingBox.getSize(s);
                var maxDim = Math.max(s.x, s.y, s.z);
                meshSizes.push({ mesh: child, maxDim: maxDim, name: child.name });
              }
            }
          });

          // Find median size to detect outliers
          if (meshSizes.length > 2) {
            var sorted = meshSizes.map(function (m) { return m.maxDim; }).sort(function (a, b) { return a - b; });
            var median = sorted[Math.floor(sorted.length / 2)];
            meshSizes.forEach(function (item) {
              // If a mesh is 20x bigger than median, it's likely a backdrop
              if (item.maxDim > median * 20 && item.maxDim > 50) {
                item.mesh.visible = false;
                console.log('auto-scale: hid backdrop mesh "' + item.name + '" (size:' + item.maxDim.toFixed(0) + ' vs median:' + median.toFixed(0) + ')');
              }
            });
          }

          // Measure native size at scale 1
          this.el.object3D.scale.set(1, 1, 1);
          this.el.object3D.updateMatrixWorld(true);
          var box = new THREE.Box3().setFromObject(mesh);
          var size = new THREE.Vector3();
          box.getSize(size);
          var nativeMax = Math.max(size.x, size.y, size.z);
          if (nativeMax <= 0) {
            this.el.object3D.visible = true;
            return;
          }
          var newScale = this.data.height / nativeMax;
          this.el.object3D.scale.set(newScale, newScale, newScale);
          this.el.object3D.visible = true;
          console.log('auto-scale:', this.el.getAttribute('gltf-model'),
            'native:', nativeMax.toFixed(1), '-> scale:', newScale.toFixed(4),
            '-> final:', this.data.height.toFixed(1) + 'm');
        });
      }
    });
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      transition: opacity 0.8s;
    }

    #loading-screen h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid #333;
      border-top: 4px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #info-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 25px;
      border-radius: 30px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      z-index: 100;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <h1>🏠 Loading Joeben's Mansion...</h1>
    <div class="loader"></div>
  </div>
  <div id="info-panel">WASD to move · Mouse to look · Explore the modern house compound</div>

  <a-scene fog="type: linear; color: #87CEEB; far: 250; near: 120" loading-screen="enabled: false">

    <!-- ============ ASSETS ============ -->
    <a-assets timeout="15000">
      <a-asset-item id="pool" src="3D Models/swimming_pool (1).glb"></a-asset-item>
      <a-asset-item id="coconut-tree" src="3D Models/coconut_tree.glb"></a-asset-item>
      <a-asset-item id="car" src="3D Models/generic_passenger_car_pack.glb"></a-asset-item>
      <a-asset-item id="house" src="3D Models/modern_luxury_villa_house_building_home.glb"></a-asset-item>
      <a-asset-item id="bed" src="3D Models/bed.glb"></a-asset-item>
      <a-asset-item id="sofa-corner" src="3D Models/corner_sofa.glb"></a-asset-item>
    </a-assets>

    <!-- ============ ENVIRONMENT ============ -->
    <a-sky color="#87CEEB"></a-sky>
    <a-entity light="type: ambient; color: #BBE; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.9" position="10 15 5"></a-entity>
    <a-entity light="type: directional; color: #FFE4B5; intensity: 0.3" position="-5 10 -10"></a-entity>

    <!-- Ground -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="250" height="250" color="#4a7c3f"></a-plane>

    <!-- Simulated Ocean Water for Pool -->
    <!-- Positioned centrally in front of the 4 arches to fill the pool cutout -->
    <a-ocean id="pool-water" position="2.5 0.05 -4.5" width="24" depth="4.8" density="50" amplitude="0.01"
      amplitude-variance="0.01" speed="1.5" opacity="0.85" color="#0cf"></a-ocean>

    <!-- ============ COMPOUND WALLS & GATE ============ -->
    <!-- Front wall with gate opening -->
    <a-box position="-25 1.5 40" width="38" height="3" depth="0.4" color="#d4c5a9"></a-box>
    <a-box position="25 1.5 40" width="38" height="3" depth="0.4" color="#d4c5a9"></a-box>
    <!-- Gate pillars -->
    <a-box position="-6.2 2 40" width="1" height="4" depth="1" color="#8B7355"></a-box>
    <a-box position="6.2 2 40" width="1" height="4" depth="1" color="#8B7355"></a-box>
    <a-box position="-6.2 4.2 40" width="1.3" height="0.4" depth="1.3" color="#6B5335"></a-box>
    <a-box position="6.2 4.2 40" width="1.3" height="0.4" depth="1.3" color="#6B5335"></a-box>
    <!-- Gate bars -->
    <a-box position="-4 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="-2.5 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="-1 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="0.5 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="2 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="3.5 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="5 1.5 40" width="0.15" height="3" depth="0.1" color="#333"></a-box>
    <a-box position="0 0.5 40" width="12" height="0.1" depth="0.1" color="#333"></a-box>
    <a-box position="0 1.5 40" width="12" height="0.1" depth="0.1" color="#333"></a-box>
    <a-box position="0 2.8 40" width="12" height="0.15" depth="0.12" color="#222"></a-box>
    <!-- Side & back walls -->
    <a-box position="-44 1.5 0" width="0.4" height="3" depth="80" color="#d4c5a9"></a-box>
    <a-box position="44 1.5 0" width="0.4" height="3" depth="80" color="#d4c5a9"></a-box>
    <a-box position="0 1.5 -40" width="88" height="3" depth="0.4" color="#d4c5a9"></a-box>

    <!-- ============ DRIVEWAY ============ -->
    <a-plane position="0 0.02 25" rotation="-90 0 0" width="8" height="30" color="#888"></a-plane>
    <a-plane position="0 0.03 25" rotation="-90 0 0" width="0.15" height="30" color="#EEE"></a-plane>

    <!-- Palm trees along driveway -->
    <a-entity gltf-model="#coconut-tree" position="-7 0 37" auto-scale="height:10"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="-7 0 32" auto-scale="height:9"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="-7 0 27" auto-scale="height:10.5"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="-7 0 22" auto-scale="height:9.5"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="-7 0 17" auto-scale="height:10"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="-7 0 12" auto-scale="height:9"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="7 0 37" auto-scale="height:9.5"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="7 0 32" auto-scale="height:10.5"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="7 0 22" auto-scale="height:10"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="7 0 12" auto-scale="height:10"></a-entity>

    <!-- ============ CAR PARK ============ -->
    <a-plane position="32 0.02 18" rotation="-90 0 0" width="20" height="14" color="#666"></a-plane>
    <a-plane position="24 0.03 18" rotation="-90 0 0" width="0.1" height="14" color="#FFF"></a-plane>
    <a-plane position="32 0.03 18" rotation="-90 0 0" width="0.1" height="14" color="#FFF"></a-plane>
    <a-plane position="40 0.03 18" rotation="-90 0 0" width="0.1" height="14" color="#FFF"></a-plane>
    <a-entity gltf-model="#car" position="32 0 18" rotation="0 90 0" auto-scale="height:15"></a-entity>

    <!-- ============ GARDEN ============ -->
    <a-entity gltf-model="#coconut-tree" position="-35 0 20" auto-scale="height:11"></a-entity>
    <a-entity gltf-model="#coconut-tree" position="35 0 20" auto-scale="height:9"></a-entity>


    <!-- Flower beds -->
    <a-box position="-10 0.15 8" width="3" height="0.3" depth="1.5" color="#3d2b1f"></a-box>
    <a-sphere position="-10.5 0.5 8" radius="0.3" color="#ff6b8a"></a-sphere>
    <a-sphere position="-9.8 0.55 8" radius="0.25" color="#ff4757"></a-sphere>
    <a-sphere position="-10.2 0.45 7.6" radius="0.28" color="#ffa502"></a-sphere>

    <!-- ============ INTERIOR ROOMS ============ -->
    <!-- Room 1: Bedroom (Far Left) -->
    <a-entity id="room-bedroom" position="-5.5 0.5 -14.5">
      <!-- Bed moved down (-0.5) to fix float, shifted right (x=1.5) away from closet, brought forward (z=0.5) -->
      <a-entity gltf-model="#bed" position="1.5 -0.5 0.5" rotation="0 180 0" auto-scale="height:3.0"></a-entity>
      <!-- Wardrobe raised (y=1.0) so it doesn't sink into the ground, kept other coords -->
      <a-entity gltf-model="#wardrobe" position="-1.5 0.7 -2.5" rotation="0 90 0" auto-scale="height:2.3"></a-entity>
      <!-- Carpet lowered by 0.45 to fix floating -->
      <a-box position="1.5 -0.45 0" width="3" height="0.05" depth="2" color="#A0522D"></a-box><!-- Rug -->
    </a-entity>

    <!-- Room 2: Living Room (Middle Left) -->
    <a-entity id="room-living" position="2.5 0.5 -14.0">
      <!-- Couch on the left side, facing the right wall -->
      <a-entity gltf-model="#sofa-corner" position="-1.5 -0.5 0.5" rotation="0 90 0" auto-scale="height:3.0"></a-entity>
      <!-- Table rotated and placed in between couch and TV -->
      <a-box position="1.0 0.1 0.5" width="1.0" height="0.4" depth="1.5" color="#333"
        material="opacity: 0.8; transparent: true"></a-box>
      <!-- TV shifted tightly against the right wall -->
      <a-box position="3.4 1.5 0.5" width="0.1" height="1.5" depth="2.5" color="#111"></a-box><!-- TV -->
    </a-entity>

    <!-- Room 3: Bathroom (Middle Right) -->
    <a-entity id="room-bathroom" position="10.0 0.5 -14.5">
      <!-- Lowered elements and kept tightly to x=5.5 (center of 3rd arch) -->
      <a-box position="1.0 -0.1 -0.5" width="2" height="0.6" depth="1" color="#EEE"></a-box><!-- Bathtub -->
      <a-box position="1.0 0.2 -0.5" width="1.8" height="0.1" depth="0.8" color="#87CEEB"></a-box><!-- Water line -->
      <a-box position="-1 -0.2 -1.0" width="0.5" height="0.5" depth="0.7" color="#FFF"></a-box><!-- Toilet -->
      <a-box position="-1 0.3 -1.3" width="0.5" height="0.6" depth="0.2" color="#FFF"></a-box>
      <a-box position="-2.0 0.3 0" width="0.8" height="0.1" depth="1.5" color="#FFF"></a-box><!-- Vanity -->
      <a-cylinder position="-2.0 0.4 0" radius="0.3" height="0.1" color="#DDD"></a-cylinder>
      <a-plane position="-1.9 1.3 0" rotation="0 90 0" width="1.2" height="1.2" color="#AAA"></a-plane>
    </a-entity>



    <!-- ============ THE HOUSE (3D Model) ============ -->
    <a-entity gltf-model="#house" position="0 0 -15" rotation="0 0 0" auto-scale="height:40"></a-entity>

    <!-- ============ CAMERA ============ -->
    <a-entity id="rig" position="0 1.6 20" rotation="0 0 0">
      <a-camera wasd-controls="acceleration: 40" look-controls>
        <a-cursor color="#FF6600" fuse="false"></a-cursor>
      </a-camera>
    </a-entity>

  </a-scene>

  <script>
    // Hide loading screen once scene is loaded
    document.querySelector('a-scene').addEventListener('loaded', function () {
      setTimeout(function () {
        var ls = document.getElementById('loading-screen');
        if (ls) {
          ls.style.opacity = '0';
          setTimeout(function () { ls.style.display = 'none'; }, 800);
        }
      }, 2000);
    });
  </script>
</body>

</html>
